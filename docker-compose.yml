# ─────────────────────────────────────────────────────────────────────────────
# House Electricals — Local Docker Compose (build-from-source)
# ─────────────────────────────────────────────────────────────────────────────
# Builds the unified image from this repo's source and runs it. Use for
# local testing or before CI/registry wiring is set up.
#
#   docker compose up -d --build
#
# For production self-hosting (pull pre-built images from GHCR), use
# compose.prod.yaml — see DEPLOYMENT.md.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: house-electricals-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-house_electricals}
    volumes:
      # All application data now lives in Postgres — back up this volume.
      - he-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-house_electricals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: house-electricals
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Uploaded floor-plan images + the auto-generated .auth-secret live
      # on disk; the relational data lives in Postgres (the `db` service).
      - ${DATA_PATH:-./data}:/data
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-house_electricals}
      FLOOR_PLAN_DIR: /data/floor-plans
      PUBLIC_DIR: /app/public
      PORT: 3000
      HOST: 0.0.0.0
      # Auth: no AUTH_USERNAME / AUTH_PASSWORD here. First-time setup
      # is a sign-up screen at http://localhost:${HOST_PORT:-8070}/ —
      # the backend stores the (one) user row in the `app_users` table.
    ports:
      - "${HOST_PORT:-8070}:3000"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  he-pgdata:
