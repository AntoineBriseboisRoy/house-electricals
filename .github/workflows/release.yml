# ─────────────────────────────────────────────────────────────────────────────
# House Electricals — Build & Publish to GitHub Container Registry (GHCR)
# ─────────────────────────────────────────────────────────────────────────────
# Builds the unified backend + frontend Docker image and pushes it to GHCR
# under the repository owner's namespace, e.g.:
#
#   ghcr.io/antoinebriseboisroy/house-electricals:latest
#   ghcr.io/antoinebriseboisroy/house-electricals:<commit-sha>
#   ghcr.io/antoinebriseboisroy/house-electricals:<git-tag>      (only on v*.*.* tags)
#
# Self-hosters pull this single image via compose.prod.yaml — see
# DEPLOYMENT.md.
#
# Required permissions: `packages: write` (granted below — no PAT needed;
# the default GITHUB_TOKEN is used).
# ─────────────────────────────────────────────────────────────────────────────

name: Build and publish image

on:
  push:
    branches: [main, master]
    # Any version tag — clean releases (v1.2.3) AND pre-releases
    # (v1.2.3-rc.1 / -beta.2 / -alpha.1). The channel each maps to is
    # decided by the "Classify the release channel" step below.
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: house-electricals

# Least privilege at the workflow level; the publish job widens its own scope.
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Gate: typecheck + build + backend test suite must pass before we publish
  # an image. The backend tests run against a real Postgres (the engine the
  # app ships with) spun up as a service container — schema-per-suite
  # isolation means they need a reachable Postgres, not a mock.
  # ───────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: house_electricals
        # Host port 5433 matches the repo's default DATABASE_URL + the dev
        # compose file, so local and CI hit the same connection string.
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version is read from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Topological: @he/shared builds first so backend/frontend resolve
        # its emitted .d.ts. Also catches Vite build breaks before we bother
        # building a Docker image.
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Backend tests (against the Postgres service)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/house_electricals
          # buildFloorPlanRoutes mkdir's this at app construction; the
          # default (/data/floor-plans) is unwritable on the runner.
          FLOOR_PLAN_DIR: ${{ runner.temp }}/floor-plans
        run: pnpm --filter @he/backend test

  build-and-push:
    runs-on: ubuntu-latest
    # Never publish an image from a red build.
    needs: test
    # Only this job pushes to GHCR, so only this job gets write scope.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can resolve the nearest
          # release tag for the build version stamp (below).
          fetch-depth: 0
          fetch-tags: true

      - name: Compute build version metadata
        id: ver
        # Runs on the runner (which HAS git) — NOT inside the Docker build,
        # whose alpine base lacks git and whose context excludes .git. The
        # results are injected into the image via build-args.
        run: |
          DESCRIBE="$(git describe --tags --always --dirty 2>/dev/null || echo "${GITHUB_SHA}")"
          echo "describe=${DESCRIBE}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set lowercase owner
        # GHCR requires the image path to be lowercase; the GitHub owner
        # may not be.
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$OWNER_LC/${{ env.IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - name: Classify the release channel
        id: channel
        # Three channels, decided purely by the git ref shape:
        #   - push to main/master         → nightly  (also keeps :latest moving)
        #   - tag vX.Y.Z-rc.N / -beta / -alpha (a pre-release) → beta
        #   - tag vX.Y.Z (clean, no suffix)                    → stable
        # The boolean outputs gate the channel tags in the metadata step so
        # exactly one channel pointer moves per run. See RELEASING.md.
        run: |
          REF='${{ github.ref }}'
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"
            if [[ "$TAG" == *-* ]]; then
              CHANNEL=beta        # v1.2.3-rc.1, v1.2.3-beta.2, …
            else
              CHANNEL=stable      # v1.2.3
            fi
          else
            CHANNEL=nightly       # push to main/master (or workflow_dispatch)
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "is_nightly=$([[ "$CHANNEL" == nightly ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "is_beta=$([[ "$CHANNEL" == beta ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "is_stable=$([[ "$CHANNEL" == stable ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "[release] ref=$REF → channel=$CHANNEL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: image_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          # Channel pointers (nightly/beta/stable) + immutable identifiers
          # (full SHA always; semver parts only on a clean release tag). The
          # `latest` pointer tracks STABLE — it moves only on a clean vX.Y.Z
          # release tag, so `:latest` always means "newest soak-tested
          # release" (the Docker convention). Each channel-raw tag is gated by
          # the matching boolean from the classify step, so exactly one channel
          # pointer moves per run.
          tags: |
            type=raw,value=nightly,enable=${{ steps.channel.outputs.is_nightly }}
            type=raw,value=beta,enable=${{ steps.channel.outputs.is_beta }}
            type=raw,value=stable,enable=${{ steps.channel.outputs.is_stable }}
            type=raw,value=latest,enable=${{ steps.channel.outputs.is_stable }}
            type=sha,format=long
            type=semver,pattern={{version}},enable=${{ steps.channel.outputs.is_stable }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.channel.outputs.is_stable }}
            type=semver,pattern={{major}},enable=${{ steps.channel.outputs.is_stable }}
            type=semver,pattern={{version}},enable=${{ steps.channel.outputs.is_beta }}

      - name: Build & push
        # The version stamps (GIT_SHA / GIT_DESCRIBE / BUILD_TIME) are computed
        # on the runner above and surfaced in the frontend bundle as the
        # VersionPill chip + build-info modal. DO NOT compute them with git
        # INSIDE the build — alpine base lacks git and .dockerignore excludes
        # .git; they must arrive as build-args.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.tags }}
          labels: ${{ steps.image_meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_DESCRIBE=${{ steps.ver.outputs.describe }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
