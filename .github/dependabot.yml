# Dependabot keeps dependencies and CI/base images patched.
# Docs: https://docs.github.com/code-security/dependabot
version: 2

updates:
  # ── JavaScript / pnpm workspace ──────────────────────────────────────────
  # Dependabot reads the root pnpm-lock.yaml and updates across the workspace.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  # ── GitHub Actions used in workflows ─────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # ── Docker base images (runtime image is built here) ─────────────────────
  - package-ecosystem: "docker"
    directory: "/packages/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
