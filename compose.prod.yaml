# ─────────────────────────────────────────────────────────────────────────────
# House Electricals — Production Docker Compose (single-image)
# ─────────────────────────────────────────────────────────────────────────────
# Pulls the pre-built app image from GitHub Container Registry and runs it
# alongside a Postgres database. Two containers: the app (one Node process
# serving the API + SPA + uploaded images) and Postgres (all relational data).
#
# Quick start on a self-hosted server:
#
#   sudo mkdir -p /srv/house-electricals/data
#   sudo chown -R 65532:65532 /srv/house-electricals/data
#   sudo cp compose.prod.yaml /srv/house-electricals/compose.yaml
#   sudo cp .env.example     /srv/house-electricals/.env
#   # edit .env — set IMAGE, HOST_PORT, DATA_PATH, POSTGRES_PASSWORD
#   cd /srv/house-electricals
#   docker compose pull
#   docker compose up -d
#
# The image is published by .github/workflows/release.yml on every push to
# main. See DEPLOYMENT.md for the full guide.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:18-alpine
    container_name: house-electricals-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-house_electricals}
      # App-wide timezone (IANA name, e.g. America/Toronto). Empty = UTC.
      TZ: ${TZ:-}
    volumes:
      # All relational data lives in Postgres — back up this volume.
      # NOTE: mount the parent dir, not /var/lib/postgresql/data — Postgres 18+
      # stores its cluster in a version-specific subdir and refuses to start if
      # a volume is mounted at the old .../data path.
      - he-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-house_electricals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    # No default — fails loudly if IMAGE isn't set so the operator can't
    # accidentally pull a stale public maintainer image. Set it in .env
    # (e.g. ghcr.io/<your-github-username>/house-electricals:latest).
    image: ${IMAGE:?IMAGE must be set in .env — see .env.example}
    container_name: house-electricals
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Uploaded floor-plan images + the auto-generated .auth-secret live
      # on disk; all relational data lives in Postgres (the `db` service).
      - ${DATA_PATH:-./data}:/data
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-house_electricals}
      FLOOR_PLAN_DIR: /data/floor-plans
      PUBLIC_DIR: /app/public
      PORT: 3000
      HOST: 0.0.0.0
      # App-wide display timezone (IANA name, e.g. America/Toronto). The Node
      # process uses it for date math; the SPA reads it from /api/v1/config so
      # every screen shows dates in this zone. Empty = each device's local time.
      TZ: ${TZ:-}
      # Auth: no AUTH_USERNAME / AUTH_PASSWORD here. First-time setup
      # is a sign-up screen the first time you open the app — the
      # backend stores the (one) user row in the `app_users` table.
    ports:
      # Your reverse proxy (Caddy / Cloudflare Tunnel / Nginx / Traefik)
      # forwards to this host port.
      - "${HOST_PORT:-8070}:3000"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  he-pgdata:
