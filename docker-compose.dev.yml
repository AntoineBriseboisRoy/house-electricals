# ─────────────────────────────────────────────────────────────────────────────
# House Electricals — Local DEV database
# ─────────────────────────────────────────────────────────────────────────────
# Runs ONLY Postgres, for use with `pnpm dev` (the backend itself runs on the
# host via tsx, not in a container) and the backend test suite.
#
#   docker compose -f docker-compose.dev.yml up -d
#
# The backend (and `DATABASE_URL` in .env.dev) connect to it on host port
# 5433 so it never clashes with a system Postgres on the default 5432.
#
# Wipe + reset:  docker compose -f docker-compose.dev.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:18-alpine
    container_name: he-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: house_electricals
    ports:
      - "5433:5432"
    volumes:
      # Mount the parent dir, not /var/lib/postgresql/data — Postgres 18+ stores
      # its cluster in a version-specific subdir and refuses to start otherwise.
      - he-pgdata-dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d house_electricals"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  he-pgdata-dev:
